<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matriz de Confusión CSV</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Premium Stylesheet -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card mb-4">
        <div class="card-header bg-dark">
            <h2 class="mb-0 fs-3 text-gradient"><i class="bi bi-grid-3x3-gap-fill me-2"></i>Matriz de Confusión (Dataset CSV)</h2>
        </div>
        <div class="card-body text-center">
            <p class="text-muted text-start mb-4">
                La matriz representa el desempeño del clasificador en el dataset CSV subido y entrenado por el usuario. Las predicciones correctas se encuentran en la diagonal principal.
            </p>
            
            <div class="d-inline-block p-2 bg-dark rounded-3 border border-secondary">
                <img
                    src="{{ url_for('static', filename='matriz_csv.png') }}"
                    class="img-fluid border"
                    alt="Matriz de Confusión CSV"
                    style="max-width: 500px; width: 100%; border-radius: 8px;"
                >
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-center">
        <a href="/" class="btn btn-primary px-5">
            <i class="bi bi-arrow-left me-2"></i>Volver al Inicio
        </a>
    </div>

</div>

</body>
</html>
